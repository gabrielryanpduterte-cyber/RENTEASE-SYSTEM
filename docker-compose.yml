services:
  mysql:
    image: mysql:8.4
    container_name: rentease-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rentease_db
      MYSQL_USER: rentease
      MYSQL_PASSWORD: rentease
      TZ: Asia/Manila
    ports:
      - "3308:3306"
    volumes:
      - rentease_mysql_data:/var/lib/mysql
      - ./database/rentease_base_schema.sql:/docker-entrypoint-initdb.d/01-base-schema.sql:ro
      - ./database/staging_seed.sql:/docker-entrypoint-initdb.d/02-staging-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: rentease-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      RENTEASE_APP_NAME: RentEase
      RENTEASE_APP_ENV: local
      RENTEASE_APP_URL: http://localhost:8080
      RENTEASE_FRONTEND_URL: http://localhost:5173
      RENTEASE_DB_HOST: mysql
      RENTEASE_DB_PORT: 3306
      RENTEASE_DB_NAME: rentease_db
      RENTEASE_DB_USER: rentease
      RENTEASE_DB_PASS: rentease
      RENTEASE_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      RENTEASE_COOKIE_SAMESITE: Lax
      RENTEASE_COOKIE_DOMAIN:
      GOOGLE_OAUTH_ENABLED: ${GOOGLE_OAUTH_ENABLED:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:5173/auth/google/callback}
      MAIL_PROVIDER: ${MAIL_PROVIDER:-resend}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-RentEase}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-support@rmail.rentease.shop}
      MAIL_REPLY_TO: ${MAIL_REPLY_TO:-renteasesupport@gmail.com}
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - rentease_backend_vendor:/var/www/html/vendor

  frontend:
    image: node:22-alpine
    container_name: rentease-frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: /backend
      VITE_APP_ENV: local
      VITE_APP_NAME: RentEase
      VITE_PROXY_TARGET: http://backend
      VITE_PROXY_REWRITE_PREFIX: ""
      VITE_DEBUG_PROXY: "false"
      VITE_ENABLE_GOOGLE_AUTH: ${VITE_ENABLE_GOOGLE_AUTH:-false}
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
      VITE_GOOGLE_REDIRECT_URI: ${VITE_GOOGLE_REDIRECT_URI:-http://localhost:5173/auth/google/callback}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - rentease_frontend_node_modules:/app/node_modules
    command: sh -c "npm ci && rm -rf node_modules/.vite && npm run dev -- --host 0.0.0.0"

volumes:
  rentease_mysql_data:
  rentease_backend_vendor:
  rentease_frontend_node_modules:
